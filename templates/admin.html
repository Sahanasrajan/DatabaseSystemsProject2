{% extends "base.html" %}
{% block title %}SkySearch — Admin{% endblock %}
{% block breadcrumb %}Admin — Add Data{% endblock %}

{% block content %}
<p class="section-title">Admin Panel</p>
<h1>Add New Data</h1>

<div class="card" style="margin-bottom:1.5rem;">
  <h2 style="margin-bottom:1rem;">Add Airport</h2>
  <form method="POST" action="/admin/add_airport">
    <div class="form-grid">
      <div class="form-group">
        <label>Airport Code</label>
        <input type="text" name="airport_code" placeholder="e.g. BOS" maxlength="3" required>
      </div>
      <div class="form-group">
        <label>Airport Name</label>
        <input type="text" name="name" placeholder="e.g. Boston Logan International" required>
      </div>
      <div class="form-group">
        <label>City</label>
        <input type="text" name="city" placeholder="e.g. Boston" required>
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" name="country" placeholder="e.g. United States" required>
      </div>
    </div>
    <div class="form-footer">
      <button type="submit" class="btn">+ Add Airport</button>
    </div>
  </form>
</div>

<div class="card" style="margin-bottom:1.5rem;">
  <h2 style="margin-bottom:1rem;">Add Aircraft</h2>
  <form method="POST" action="/admin/add_aircraft">
    <div class="form-grid">
      <div class="form-group">
        <label>Plane Type</label>
        <input type="text" name="plane_type" placeholder="e.g. Airbus A380" required>
      </div>
      <div class="form-group">
        <label>Capacity</label>
        <input type="number" name="capacity" placeholder="e.g. 50" required>
      </div>
    </div>
    <div class="form-footer">
      <button type="submit" class="btn">+ Add Aircraft</button>
    </div>
  </form>
</div>

<div class="card" style="margin-bottom:1.5rem;">
  <h2 style="margin-bottom:1rem;">Add Flight</h2>
  <form method="POST" action="/admin/add_flight">
    <div class="form-grid">
      <div class="form-group">
        <label>Flight Number</label>
        <input type="text" name="flight_number" placeholder="e.g. AA101" required>
      </div>
      <div class="form-group">
        <label>Departure Date</label>
        <input type="date" name="departure_date" required>
      </div>
      <div class="form-group">
        <label>Plane Type</label>
        <select name="plane_type" required>
          <option value="" disabled selected>Select aircraft...</option>
          {% for ac in aircraft %}
          <option value="{{ ac['plane_type'] }}">{{ ac['plane_type'] }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-footer">
      <button type="submit" class="btn">+ Add Flight</button>
    </div>
  </form>
</div>

<div style="margin-top:1.5rem;">
  <a href="/" class="btn btn-outline btn-sm">Back to Search</a>
</div>
{% endblock %}
